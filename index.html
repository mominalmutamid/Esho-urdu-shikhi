<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="উর্দু শিখি">
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Serif+Bengali:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="app">

  <!-- ================= HOME ================= -->
  <section id="view-home" class="view is-active">
    <div class="home-hero">
      <div class="home-hero-top">
        <div>
          <span class="eyebrow">এসো</span>
          <h1 class="app-title">উর্দু শিখি
            <span class="urdu-display">اردو سیکھیں</span>
          </h1>
        </div>
      </div>

      <div class="wod-heading">
        <span class="label-bn">আজকের শব্দ</span>
      </div>
      <div class="wod-wrap" id="wod-wrap"></div>
    </div>

    <div class="day-strip" id="day-strip"></div>

    <div class="home-section">
      <h2 class="section-title">মোড বেছে নিন</h2>
      <div class="mode-grid">
        <button class="mode-card" data-goto="spelling">
          <span class="mode-badge">১</span>
          <span class="title">বানান ও পঠন</span>
          <span class="desc">শুনে বানান করো, কুইজ দাও</span>
        </button>
        <button class="mode-card" data-goto="study">
          <span class="mode-badge">২</span>
          <span class="title">শব্দার্থ চর্চা</span>
          <span class="desc">অর্থ, উচ্চারণ ও বিপরীত শব্দ</span>
        </button>
        <button class="mode-card" data-goto="poetic">
          <span class="mode-badge">৩</span>
          <span class="title">কাব্যিক শব্দমালা</span>
          <span class="desc">গভীর অর্থের শব্দ ও প্রবাদ</span>
        </button>
        <button class="mode-card" data-goto="alphabet">
          <span class="mode-badge">৪</span>
          <span class="title">উর্দু অক্ষর মোড</span>
          <span class="desc">বর্ণমালা চেনো ও উচ্চারণ শোনো</span>
        </button>
        <button class="mode-card wide" data-goto="sentence">
          <span class="mode-badge">৫</span>
          <span class="title">বাক্য গঠন মোড</span>
          <span class="desc">শব্দ সাজিয়ে সঠিক বাক্য তৈরি করো</span>
        </button>
      </div>
    </div>
  </section>

  <!-- ================= SPELLING & READING ================= -->
  <section id="view-spelling" class="view spelling-view">
    <div class="topbar"><h1>বানান ও পঠন মোড</h1><span></span></div>
    <div class="subtab-row">
      <button class="subtab is-active" data-subtab="spell">বানান করো</button>
      <button class="subtab" data-subtab="quiz">পঠন কুইজ</button>
    </div>
    <div id="spelling-panel"></div>
    <div id="quiz-panel" style="display:none"></div>
  </section>

  <!-- ================= STUDY (SIDE-BY-SIDE) ================= -->
  <section id="view-study" class="view">
    <div class="topbar"><h1>শব্দার্থ ও বিপরীত শব্দ</h1><span></span></div>
    <div class="study-filterbar" id="study-filterbar"></div>
    <div class="study-stage" id="study-stage"></div>
    <div class="study-nav">
      <button class="btn btn-outline" id="study-prev">পূর্ববর্তী</button>
      <span class="study-counter" id="study-counter"></span>
      <button class="btn btn-outline" id="study-next">পরবর্তী</button>
    </div>
  </section>

  <!-- ================= POETIC (DIARY PAGE) ================= -->
  <section id="view-poetic" class="view poetic-view">
    <div class="topbar"><h1>কাব্যিক ও গভীর শব্দমালা</h1><span></span></div>
    <div class="diary-page">
      <div class="diary-inner" id="diary-inner"></div>
    </div>
    <div class="diary-nav">
      <button class="btn btn-ghost" id="poetic-prev" aria-label="আগের শব্দ">পূর্ববর্তী</button>
      <div class="diary-dots" id="diary-dots"></div>
      <button class="btn btn-ghost" id="poetic-next" aria-label="পরের শব্দ">পরবর্তী</button>
    </div>
  </section>

  <!-- ================= MY LIBRARY ================= -->
  <section id="view-library" class="view">
    <div class="topbar"><h1>আমার লাইব্রেরি</h1><span></span></div>
    <div class="content-pad" id="library-stats"></div>
    <div id="library-content"></div>
  </section>

  <!-- ================= URDU ALPHABET MODE ================= -->
  <section id="view-alphabet" class="view">
    <div class="topbar"><h1>উর্দু অক্ষর মোড</h1><span></span></div>
    <p class="content-pad" style="font-size:0.8rem;color:var(--muted);text-align:center">প্রতিটি অক্ষরের নাম, উচ্চারণ ইঙ্গিত পড়ো এবং শুনতে বোতামে ট্যাপ করো</p>
    <div class="alphabet-grid" id="alphabet-grid"></div>
  </section>

  <!-- ================= SENTENCE FORMATION MODE ================= -->
  <section id="view-sentence" class="view">
    <div class="topbar"><h1>বাক্য গঠন মোড</h1><span></span></div>
    <div class="subtab-row">
      <button class="tier-tab is-active" data-tier="easy">সহজ বাক্য</button>
      <button class="tier-tab" data-tier="hard">কঠিন (প্রবাদ)</button>
    </div>
    <div id="sentence-panel"></div>
  </section>

  <nav class="nav-spine" id="nav-spine">
    <button class="nav-item is-active" data-view="home">হোম</button>
    <button class="nav-item" data-view="spelling">বানান</button>
    <button class="nav-item" data-view="study">শব্দার্থ</button>
    <button class="nav-item" data-view="poetic">কাব্যিক</button>
    <button class="nav-item" data-view="alphabet">অক্ষর</button>
    <button class="nav-item" data-view="sentence">বাক্য</button>
    <button class="nav-item" data-view="library">লাইব্রেরি</button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script src="./app.js"></script>
</body>
</html>
